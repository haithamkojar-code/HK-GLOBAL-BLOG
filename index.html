<!DOCTYPE html>
<html lang="en" dir="ltr" id="mainHtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HK GLOBAL BLOG</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; background: #f4f4f9; color: #222; line-height: 1.6; }
        header { background: #fff; padding: 25px; border-bottom: 3px solid #1a73e8; text-align: center; position: sticky; top: 0; z-index: 1000; }
        .site-title { font-size: 2.2em; font-weight: bold; color: #1a73e8; letter-spacing: 1px; margin-bottom: 15px; }
        .lang-switch button { background: #f8f9fa; border: 1px solid #ddd; padding: 10px 20px; margin: 0 5px; cursor: pointer; border-radius: 30px; font-weight: bold; transition: 0.3s; }
        .lang-switch button:hover { background: #1a73e8; color: white; border-color: #1a73e8; }
        main { max-width: 900px; margin: 30px auto; padding: 20px; }
        .post-card { background: white; padding: 25px; margin-bottom: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid #eee; }
        .post-card h2 { margin-top: 0; color: #333; font-size: 1.8em; }
        .post-card img { max-width: 100%; border-radius: 10px; margin: 15px 0; display: block; }
        .tag { background: #e8f0fe; color: #1a73e8; padding: 5px 12px; border-radius: 5px; font-size: 0.85em; font-weight: bold; text-transform: uppercase; }
        footer { text-align: center; padding: 40px; color: #777; font-size: 0.9em; background: #fff; border-top: 1px solid #eee; margin-top: 50px; }
        footer a { color: #1a73e8; text-decoration: none; margin: 0 10px; }
    </style>
</head>
<body>

<header>
    <div class="site-title">HK GLOBAL BLOG</div>
    <div class="lang-switch">
        <button onclick="switchLang('en')">English</button>
        <button onclick="switchLang('ar')">العربية</button>
        <button onclick="switchLang('sv')">Svenska</button>
    </div>
</header>

<main id="postsContainer">
    </main>

<footer>
    <p>&copy; 2026 HK GLOBAL BLOG | Analytical Insights</p>
    <a href="legal.html">Legal Notice</a> | <a href="privacy.html">Privacy Policy</a>
</footer>

<script>
    // إعدادات Firebase المحدثة برابط أوروبا
    const firebaseConfig = {
        apiKey: "AIzaSyAJDyKosoysPzOjl-9DqaZIDEg8GRPfXzQ",
        authDomain: "hk-blog-3ed96.firebaseapp.com",
        projectId: "hk-blog-3ed96",
        storageBucket: "hk-blog-3ed96.firebasestorage.app",
        messagingSenderId: "339658398793",
        appId: "1:339658398793:web:e38a09f83fd01c2e773398",
        databaseURL: "https://hk-blog-3ed96-default-rtdb.europe-west1.firebasedatabase.app/"
    };
    
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    function switchLang(lang) {
        const doc = document.getElementById('mainHtml');
        if(lang === 'ar') {
            doc.dir = 'rtl';
            doc.lang = 'ar';
        } else {
            doc.dir = 'ltr';
            doc.lang = lang;
        }
        loadPosts(lang);
    }

    function loadPosts(lang) {
        const container = document.getElementById('postsContainer');
        container.innerHTML = '<p style="text-align:center;">Fetching articles...</p>';
        
        database.ref('posts').orderByChild('lang').equalTo(lang).on('value', (snapshot) => {
            container.innerHTML = '';
            if (!snapshot.exists()) {
                container.innerHTML = `<p style="text-align:center;">No articles published in this language yet.</p>`;
                return;
            }
            let posts = [];
            snapshot.forEach((child) => {
                posts.unshift(child.val()); // عرض الأحدث أولاً
            });
            
            posts.forEach((post) => {
                container.innerHTML += `
                    <article class="post-card">
                        <span class="tag">${post.category}</span>
                        <h2>${post.title}</h2>
                        ${post.imageUrl ? `<img src="${post.imageUrl}" alt="article image">` : ''}
                        <p style="white-space: pre-wrap;">${post.content}</p>
                        <div style="margin-top:20px; font-size: 0.85em; color: #999; border-top: 1px solid #eee; padding-top: 10px;">
                           📅 Published on: ${post.date}
                        </div>
                    </article>
                `;
            });
        });
    }
    // تحميل المقالات بالإنجليزية افتراضياً
    loadPosts('en');
</script>
</body>
</html>
